spring:
  application:
    name: org-service
  datasource:
    url: jdbc:postgresql://localhost:5434/db_opsflow?currentSchema=msc_org
    username: postgres
    password: 1234567890
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: msc_org
        hbm2ddl.create_namespaces: true
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

app:
  jwt:
    secret: =======================OpsFlowSecretKey2025BySeniorDev======================
  org:
    authorization:
      organization-create-roles: [ROLE_ADMIN]
      organization-read-all-roles: [ROLE_ADMIN]
      organization-delete-roles: [ROLE_ADMIN]
      location-create-roles: [ROLE_ADMIN, ROLE_MANAGER]
      location-read-all-roles: [ROLE_ADMIN]
      location-update-roles: [ROLE_ADMIN, ROLE_MANAGER]
      location-delete-roles: [ROLE_ADMIN, ROLE_MANAGER]

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
